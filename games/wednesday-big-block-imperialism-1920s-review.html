<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wednesday Big Block — Imperialism to 1920s Review</title>

<link rel="stylesheet" href="../styles.css">

<style>

.game-wrap{max-width:920px;margin:auto;padding:28px}

.panel{
background:var(--panel);
border-radius:16px;
padding:22px;
margin-bottom:20px;
border:1px solid var(--line)
}

.hud{
display:flex;
gap:18px;
flex-wrap:wrap;
margin-bottom:20px;
font-weight:700
}

.progress{
height:10px;
background:#222;
border-radius:6px;
overflow:hidden;
margin-bottom:20px
}

.progress-bar{
height:100%;
background:var(--good);
width:0%
}

.answers{display:grid;gap:10px}

.answer{
padding:12px;
border-radius:8px;
border:1px solid var(--line);
cursor:pointer
}

.answer:hover{background:#1a2740}

.correct{background:rgba(43,213,118,.25)}
.incorrect{background:rgba(255,92,122,.25)}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:700
}

.start-btn{background:var(--accent)}
.restart-btn{background:var(--warn)}

.ticket{
background:#08121f;
border:2px solid var(--good);
padding:20px;
border-radius:12px
}

</style>
</head>

<body>

<div class="game-wrap">

<div class="panel" id="startPanel">

<h2>Wednesday Big Block Review</h2>

<p><b>Topic:</b> Imperialism → 1920s Social Change</p>

<label>Student Name</label>
<input id="studentName" style="width:100%;padding:10px;margin-top:8px;margin-bottom:16px">

<button class="start-btn" onclick="startGame()">Start Game</button>

</div>


<div id="gamePanel" style="display:none">

<div class="hud">
<div>Student: <span id="studentDisplay"></span></div>
<div>Progress: <span id="progressText"></span></div>
<div>Accuracy: <span id="accuracyText">100%</span></div>
<div>Timer: <span id="timer">0</span>s</div>
<div>Started: <span id="startTime"></span></div>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="panel">

<h3 id="questionText"></h3>

<div class="answers" id="answers"></div>

<p id="hint" style="color:var(--warn)"></p>

</div>

<button class="restart-btn" onclick="restart()">Restart</button>

</div>


<div id="ticketPanel" style="display:none">

<div class="ticket">
<h2>Completion Ticket</h2>
<p id="ticketText"></p>
</div>

</div>

</div>


<script>

correct:0,

},

{

],
correct:0,

},

{

],
correct:0,

},

],

},

},

{

correct:0,

{

],

},

"women voting",
"western expansion"
],
correct:0,

},

{
q:"Which development increased nativism during the 1920s?",
answers:[

"Harlem Renaissance",
"Progressive reforms"
],
correct:0,
hint:"Laws limiting immigration."
},

{

answers:[

],
correct:0,

},

{

],

},

{
q:"Which technology revolutionized transportation in the 1920s?",
answers:[
"automobile",
"telegraph",
"steam engine",
"plow"
],
correct:0,

},

{
q:"Talking motion pictures changed entertainment by",
answers:[
"adding sound to films",
"eliminating theaters",
"reducing movie attendance",
"ending radio broadcasting"
],
correct:0,

},

],

],

],

},

{
q:"Which innovation helped people receive news quickly across the country?",
answers:[
"radio broadcasting",
"canal systems",

"hand printing"
],
correct:0,
hint:"Mass communication device."
},

{
q:"What social effect did automobiles create?",
answers:[
"greater mobility and suburban growth",
"reduced travel",

],
correct:0,

},

{
q:"Which movement encouraged pride in African American identity?",
answers:[

],
correct:0,

},

{

answers:[
"rapid technological change created cultural transformation",

],
correct:0,
hint:"Major innovations shaped society."
}

]

let qIndex=0
let correct=0
let total=questions.length
let startTime
let timerInterval

function startGame(){

const name=document.getElementById("studentName").value

if(!name){alert("Enter name");return}

document.getElementById("studentDisplay").innerText=name
document.getElementById("startPanel").style.display="none"
document.getElementById("gamePanel").style.display="block"

startTime=new Date()
document.getElementById("startTime").innerText=startTime.toLocaleTimeString()

timerInterval=setInterval(()=>{
document.getElementById("timer").innerText++
},1000)

loadQuestion()

}

function loadQuestion(){

const q=questions[qIndex]

document.getElementById("questionText").innerText=q.q
document.getElementById("hint").innerText=""

const answersDiv=document.getElementById("answers")
answersDiv.innerHTML=""

q.answers.forEach((a,i)=>{

const div=document.createElement("div")
div.className="answer"
div.innerText=a

div.onclick=()=>submitAnswer(i,div)

answersDiv.appendChild(div)

})

updateHUD()

}

function submitAnswer(i,div){

const q=questions[qIndex]

if(i===q.correct){

div.classList.add("correct")
correct++

setTimeout(()=>{
qIndex++

if(qIndex>=total){
finish()
}else{
loadQuestion()
}

},500)

}else{

div.classList.add("incorrect")
document.getElementById("hint").innerText=q.hint

}

}

function updateHUD(){

document.getElementById("progressText").innerText=(qIndex+1)+" / "+total

document.getElementById("accuracyText").innerText=
Math.round((correct/(qIndex||1))*100)+"%"

document.getElementById("progressBar").style.width=
((qIndex)/total*100)+"%"

}

function finish(){

clearInterval(timerInterval)

if(correct!==total){
alert("100% accuracy required. Restart the run.")
restart()
return
}

document.getElementById("gamePanel").style.display="none"

const end=new Date()

document.getElementById("ticketPanel").style.display="block"

document.getElementById("ticketText").innerHTML=
"Student: "+document.getElementById("studentDisplay").innerText+"<br>"+
"Game: Wednesday Big Block Review<br>"+
"Accuracy: 100%<br>"+
"Completed: "+end.toLocaleString()

}

function restart(){location.reload()}

</script>

</body>
</html>
